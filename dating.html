<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating Quiz - Swipe Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1F4E78;
            --secondary: #E74C3C;
            --accent: #F39C12;
            --correct: #27AE60;
            --incorrect: #E74C3C;
            --bg-color: #F8F9FA;
            --text-color: #333333;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #0F2E4F 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: var(--white);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
        }

        .card-container {
            perspective: 1000px;
            position: relative;
            height: 500px;
            margin-bottom: 30px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s ease, opacity 0.1s ease;
            touch-action: none;
        }

        .card.active {
            z-index: 10;
        }

        .card.swiped-left {
            animation: swipeLeft 0.6s ease-out forwards;
        }

        .card.swiped-right {
            animation: swipeRight 0.6s ease-out forwards;
        }

        @keyframes swipeLeft {
            to {
                transform: translateX(-150%) rotate(-30deg);
                opacity: 0;
            }
        }

        @keyframes swipeRight {
            to {
                transform: translateX(150%) rotate(30deg);
                opacity: 0;
            }
        }

        .card-number {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .card-question {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1.4;
            margin-bottom: 30px;
        }

        .card-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
            justify-content: center;
        }

        .option-btn {
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid #E0E0E0;
            background: #F5F5F5;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .option-btn:hover {
            border-color: var(--secondary);
            background: #FFF5F5;
            transform: translateY(-2px);
        }

        .option-btn.selected {
            background: var(--secondary);
            color: var(--white);
            border-color: var(--secondary);
        }

        .option-btn.correct {
            background: var(--correct);
            color: var(--white);
            border-color: var(--correct);
        }

        .option-btn.incorrect {
            background: var(--incorrect);
            color: var(--white);
            border-color: var(--incorrect);
        }

        .explanation {
            background: #E8F8F5;
            border-left: 4px solid var(--correct);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-top: 20px;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation-title {
            font-weight: 700;
            color: var(--correct);
            margin-bottom: 8px;
        }

        .swipe-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .swipe-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swipe-btn.left {
            background: var(--incorrect);
            color: var(--white);
        }

        .swipe-btn.left:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
        }

        .swipe-btn.right {
            background: var(--correct);
            color: var(--white);
        }

        .swipe-btn.right:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }

        .swipe-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .results-screen {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .results-screen.show {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-score {
            font-size: 4rem;
            font-weight: 900;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        .results-percentage {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .results-message {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .results-button {
            background: var(--secondary);
            color: var(--white);
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .results-button:hover {
            background: #C0392B;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.3);
        }

        .intro-screen {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .intro-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .intro-description {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .start-button {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: var(--white);
            border: none;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
            }

            .card-question {
                font-size: 1.5rem;
            }

            .swipe-btn {
                width: 70px;
                height: 70px;
                font-size: 1.8rem;
            }

            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 Dating Quiz</h1>
            <p>Swipe to answer • Learn vocabulary</p>
        </div>

        <div class="intro-screen" id="introScreen">
            <h2 class="intro-title">Welcome! 👋</h2>
            <p class="intro-description">
                Test your dating vocabulary knowledge by swiping through 20 questions. Swipe LEFT for the first option, RIGHT for the second option. Let's go!
            </p>
            <button class="start-button" onclick="startQuiz()">Start Swiping →</button>
        </div>

        <div id="quizContainer" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="card-container" id="cardContainer"></div>

            <div class="swipe-buttons">
                <button class="swipe-btn left" id="leftBtn" onclick="swipeLeft()">👎</button>
                <button class="swipe-btn right" id="rightBtn" onclick="swipeRight()">👍</button>
            </div>
        </div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-score" id="finalScore">0/20</div>
            <div class="results-percentage" id="finalPercentage">0%</div>
            <div class="results-message" id="resultMessage"></div>
            <button class="results-button" onclick="location.reload()">Play Again 🔄</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: 'We\'re just _______ right now.',
                options: ['CASUAL', 'CAUSAL'],
                correct: 0,
                explanation: '"Casual" means informal. "Causal" means relating to a cause.'
            },
            {
                question: 'There\'s no _______ relationship between dating apps and happiness.',
                options: ['CASUAL', 'CAUSAL'],
                correct: 1,
                explanation: '"Causal" is the correct term for cause-effect relationships.'
            },
            {
                question: 'I\'m _______ someone new.',
                options: ['DATING', 'SEEING'],
                correct: 0,
                explanation: 'Both work, but "dating" is more general for the early stage.'
            },
            {
                question: 'We\'re _______ each other.',
                options: ['DATING', 'SEEING'],
                correct: 1,
                explanation: '"Seeing" implies a more exclusive, consistent connection.'
            },
            {
                question: 'A good relationship needs _______.',
                options: ['COMMITMENT', 'COMPROMISE'],
                correct: 0,
                explanation: '"Commitment" is dedication to your partner.'
            },
            {
                question: 'We had to _______ on where to live.',
                options: ['COMMITMENT', 'COMPROMISE'],
                correct: 1,
                explanation: '"Compromise" means meeting in the middle on decisions.'
            },
            {
                question: 'I have _______ in him.',
                options: ['TRUST', 'FAITH'],
                correct: 1,
                explanation: '"Faith" is belief without proof. "Trust" is based on evidence.'
            },
            {
                question: 'I can _______ him with my secrets.',
                options: ['TRUST', 'FAITH'],
                correct: 0,
                explanation: '"Trust" is based on his consistent behavior.'
            },
            {
                question: 'Physical _______ is important.',
                options: ['ATTRACTION', 'AFFECTION'],
                correct: 0,
                explanation: '"Attraction" is physical/sexual interest.'
            },
            {
                question: 'She showed me _______ by holding my hand.',
                options: ['ATTRACTION', 'AFFECTION'],
                correct: 1,
                explanation: '"Affection" is emotional warmth and tenderness.'
            },
            {
                question: 'Being _______ is not _______.',
                options: ['VULNERABLE / WEAK', 'WEAK / VULNERABLE'],
                correct: 0,
                explanation: 'Being vulnerable (emotionally open) is NOT weak (lacking strength).'
            },
            {
                question: 'He _______ me without explaining why.',
                options: ['GHOSTED', 'BLOCKED'],
                correct: 0,
                explanation: '"Ghosting" is suddenly cutting off communication.'
            },
            {
                question: 'She _______ me on Instagram.',
                options: ['GHOSTED', 'BLOCKED'],
                correct: 1,
                explanation: '"Blocking" is preventing someone from contacting you.'
            },
            {
                question: 'We have great _______.',
                options: ['CHEMISTRY', 'CONNECTION'],
                correct: 0,
                explanation: '"Chemistry" is that special, unexplainable attraction.'
            },
            {
                question: 'We\'re in a _______ right now.',
                options: ['SITUATIONSHIP', 'RELATIONSHIP'],
                correct: 0,
                explanation: '"Situationship" is undefined and ambiguous.'
            },
            {
                question: 'He\'s _______ me by keeping other options open.',
                options: ['CUSHIONING', 'GHOSTING'],
                correct: 0,
                explanation: '"Cushioning" is maintaining backup romantic options.'
            },
            {
                question: 'She was _______ by using old photos.',
                options: ['KITTENFISHING', 'CATFISHING'],
                correct: 0,
                explanation: '"Kittenfishing" is presenting a slightly misleading version.'
            },
            {
                question: 'He _______ me and now he\'s messaging me again.',
                options: ['GHOSTED', 'ZOMBIEING'],
                correct: 0,
                explanation: 'He ghosted (disappeared), now he\'s zombieing (reappearing).'
            },
            {
                question: 'We\'ve been _______ online for weeks.',
                options: ['CHATTING', 'TALKING'],
                correct: 0,
                explanation: '"Chatting" is casual conversation; "talking" is serious discussion.'
            },
            {
                question: 'I can _______ him with my heart.',
                options: ['TRUST', 'FAITH'],
                correct: 1,
                explanation: '"Faith" is complete confidence without requiring proof.'
            }
        ];

        let currentIndex = 0;
        let score = 0;
        let selectedAnswer = null;
        let answered = false;

        function startQuiz() {
            document.getElementById('introScreen').classList.add('hidden');
            document.getElementById('quizContainer').classList.remove('hidden');
            renderCard();
        }

        function renderCard() {
            const question = questions[currentIndex];
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'card active';

            let html = `
                <div>
                    <div class="card-number">Question ${currentIndex + 1} of ${questions.length}</div>
                    <div class="card-question">${question.question}</div>
                </div>
                <div class="card-options">
                    <button class="option-btn" onclick="selectOption(0)">${question.options[0]}</button>
                    <button class="option-btn" onclick="selectOption(1)">${question.options[1]}</button>
                </div>
                <div class="explanation" id="explanation">
                    <div class="explanation-title">✓ Correct!</div>
                    <div id="explanationText"></div>
                </div>
            `;

            card.innerHTML = html;
            container.appendChild(card);

            updateProgress();
            selectedAnswer = null;
            answered = false;
        }

        function selectOption(index) {
            if (answered) return;

            const question = questions[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            selectedAnswer = index;

            buttons.forEach((btn, i) => {
                if (i === question.correct) {
                    btn.classList.add('correct');
                } else if (i === index) {
                    btn.classList.add('incorrect');
                }
                btn.disabled = true;
            });

            if (index === question.correct) {
                score++;
            }

            document.getElementById('explanation').classList.add('show');
            document.getElementById('explanationText').textContent = question.explanation;

            answered = true;
        }

        function swipeLeft() {
            if (!answered) return;
            const card = document.querySelector('.card.active');
            card.classList.add('swiped-left');
            setTimeout(nextQuestion, 600);
        }

        function swipeRight() {
            if (!answered) return;
            const card = document.querySelector('.card.active');
            card.classList.add('swiped-right');
            setTimeout(nextQuestion, 600);
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderCard();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const percent = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function showResults() {
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('resultsScreen').classList.add('show');

            const percentage = (score / questions.length) * 100;
            document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
            document.getElementById('finalPercentage').textContent = `${percentage.toFixed(0)}%`;

            let message = '';
            if (percentage === 100) {
                message = '🎉 Perfect! You\'re a dating vocab master!';
            } else if (percentage >= 80) {
                message = '🌟 Excellent! Great understanding!';
            } else if (percentage >= 60) {
                message = '👍 Good job! Keep practicing!';
            } else if (percentage >= 40) {
                message = '📚 Not bad! Review and try again!';
            } else {
                message = '💪 Keep learning! You\'ll get there!';
            }

            document.getElementById('resultMessage').textContent = message;
        }
    </script>
</body>
</html>
