<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Loneliness Epidemic - Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: #fff; padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; background: #000; border: 3px solid #fff; padding: 40px; }
        .header { text-align: center; margin-bottom: 40px; border-bottom: 3px solid #fff; padding-bottom: 20px; }
        .header h1 { font-size: 2.5em; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .header p { font-size: 1.1em; color: #ccc; }
        .progress-bar { width: 100%; height: 8px; background: #333; margin-bottom: 30px; border: 1px solid #666; }
        .progress-fill { height: 100%; background: #fff; transition: width 0.3s ease; }
        .quiz-section { margin-bottom: 40px; display: none; }
        .quiz-section.active { display: block; }
        .question-number { font-size: 0.9em; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .question-title { font-size: 1.8em; font-weight: 900; margin-bottom: 25px; line-height: 1.3; }
        .question-category { display: inline-block; background: #fff; color: #000; padding: 5px 15px; font-size: 0.85em; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .options { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .option { background: #111; border: 2px solid #666; padding: 15px 20px; cursor: pointer; transition: all 0.3s ease; font-size: 1.05em; display: flex; align-items: center; }
        .option:hover { border-color: #fff; background: #222; }
        .option input[type="radio"] { margin-right: 15px; cursor: pointer; width: 18px; height: 18px; }
        .option.selected { border-color: #fff; background: #222; }
        .button-group { display: flex; gap: 15px; margin-top: 30px; justify-content: space-between; }
        button { background: #fff; color: #000; border: none; padding: 12px 30px; font-size: 1em; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        button:hover { background: #000; color: #fff; border: 2px solid #fff; }
        .results-screen { display: none; text-align: center; }
        .results-screen.show { display: block; }
        .score { font-size: 4em; font-weight: 900; margin: 30px 0; }
        .score.excellent { color: #00ff00; }
        .score.good { color: #ffff00; }
        .score.fair { color: #ff8800; }
        .score.poor { color: #ff0000; }
        .results-message { font-size: 1.5em; margin-bottom: 30px; line-height: 1.6; }
        .results-breakdown { background: #111; border: 2px solid #666; padding: 20px; margin: 30px 0; text-align: left; }
        .breakdown-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
        .breakdown-item:last-child { border-bottom: none; }
        .restart-btn { background: #fff; color: #000; padding: 15px 40px; font-size: 1.1em; }
        textarea { width: 100%; min-height: 120px; padding: 15px; background: #111; border: 2px solid #666; color: #fff; font-family: inherit; font-size: 1em; resize: vertical; }
        textarea:focus { outline: none; border-color: #fff; background: #222; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>The Loneliness Epidemic</h1>
            <p>Advanced English Quiz | Grammar, Vocabulary & Critical Thinking</p>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div id="quiz-content"></div>

        <div class="button-group">
            <button onclick="prevQuestion()">← PREVIOUS</button>
            <button onclick="nextQuestion()">NEXT →</button>
        </div>

        <div id="results" class="results-screen">
            <h2 style="font-size: 2em; margin-bottom: 20px;">QUIZ COMPLETE!</h2>
            <div class="score" id="score-display">0/14</div>
            <div class="results-message" id="message-display"></div>
            <div class="results-breakdown">
                <div class="breakdown-item">
                    <span>Comprehension:</span>
                    <span id="comp-display">0/3</span>
                </div>
                <div class="breakdown-item">
                    <span>Vocabulary:</span>
                    <span id="vocab-display">0/4</span>
                </div>
                <div class="breakdown-item">
                    <span>Grammar:</span>
                    <span id="grammar-display">0/5</span>
                </div>
                <div class="breakdown-item">
                    <span>Critical Thinking:</span>
                    <span id="critical-display">0/2</span>
                </div>
            </div>
            <button class="restart-btn" onclick="restartQuiz()">RESTART QUIZ</button>
        </div>
    </div>

    <script>
var questions = [
    { cat: "Comprehension", q: "According to the lesson, what is the main difference between digital connection and true intimacy?", opts: ["Digital connection is faster but less meaningful", "Digital connection lacks vulnerability, authenticity, and physical presence", "Digital connection is more reliable", "Digital connection is more expensive"], ans: 1 },
    { cat: "Comprehension", q: "What does Stanford psychologist Jamil Zaki identify as a crucial barrier to genuine connection?", opts: ["Lack of technology", "Cynicism about human nature", "Too much free time", "Poor communication skills"], ans: 1 },
    { cat: "Comprehension", q: "How does the lesson suggest we can combat loneliness?", opts: ["By spending more time on social media", "By avoiding human interaction", "By cultivating genuine, vulnerable connections with others", "By moving to a bigger city"], ans: 2 },
    { cat: "Vocabulary", q: "Which word best completes: 'The _____ of modern life often leads people to feel isolated despite constant digital connection.'", opts: ["fragmentation", "celebration", "acceleration", "documentation"], ans: 0 },
    { cat: "Vocabulary", q: "What does 'vulnerability' mean in the context of building genuine relationships?", opts: ["Being weak or defenseless", "Being open and honest about one's feelings and fears", "Being easily hurt or damaged", "Being unprepared for challenges"], ans: 1 },
    { cat: "Vocabulary", q: "The word 'epidemic' in 'loneliness epidemic' refers to:", opts: ["A disease that spreads rapidly", "A widespread occurrence of something undesirable", "A medical condition", "A temporary trend"], ans: 1 },
    { cat: "Vocabulary", q: "Which term describes the feeling of being disconnected from others despite being surrounded by people?", opts: ["Solitude", "Isolation", "Alienation", "Seclusion"], ans: 2 },
    { cat: "Grammar", q: "Choose the correct sentence:", opts: ["If we would invest more time in genuine relationships, we will feel less lonely.", "If we invested more time in genuine relationships, we would feel less lonely.", "If we invest more time in genuine relationships, we felt less lonely.", "If we would have invested more time in genuine relationships, we will feel less lonely."], ans: 1 },
    { cat: "Grammar", q: "Which sentence uses the correct conditional structure?", opts: ["Were people to prioritize face-to-face interactions, loneliness would decrease.", "If people would prioritize face-to-face interactions, loneliness would decrease.", "People to prioritize face-to-face interactions, loneliness would decrease.", "If people prioritize face-to-face interactions, loneliness would decreases."], ans: 0 },
    { cat: "Grammar", q: "Identify the sentence with correct use of reported speech:", opts: ["The psychologist said that genuine connection is more important than digital followers.", "The psychologist said that genuine connection was more important than digital followers.", "The psychologist says that genuine connection is more important than digital followers.", "The psychologist said genuine connection is more important than digital followers."], ans: 1 },
    { cat: "Grammar", q: "Which sentence correctly uses the passive voice?", opts: ["Loneliness has been considered a major public health issue by researchers.", "Researchers have been considered loneliness a major public health issue.", "Loneliness has considered a major public health issue by researchers.", "Researchers have loneliness been considered a major public health issue."], ans: 0 },
    { cat: "Critical Thinking", q: "Based on the lesson, what can we infer about the relationship between technology and loneliness?", opts: ["Technology is the sole cause of loneliness", "Technology itself is not the problem; how we use it determines its impact on our connections", "Technology has no effect on loneliness", "Loneliness only existed before the internet"], ans: 1 },
    { cat: "Critical Thinking", q: "Why might someone feel lonely despite having thousands of social media followers?", opts: ["Social media followers are not the same as genuine, vulnerable relationships", "People with many followers are naturally lonely", "Social media makes everyone lonely", "Followers prevent real connections from forming"], ans: 0 }
];

var current = 0;
var answers = [];

function renderQ() {
    var q = questions[current];
    var html = '<div class="quiz-section active"><div class="question-category">' + q.cat + '</div>';
    html += '<div class="question-number">Question ' + (current + 1) + ' of ' + questions.length + '</div>';
    html += '<div class="question-title">' + q.q + '</div><div class="options">';
    
    for (var i = 0; i < q.opts.length; i++) {
        var checked = answers[current] === i ? 'checked' : '';
        var selected = answers[current] === i ? 'selected' : '';
        html += '<label class="option ' + selected + '"><input type="radio" name="ans" value="' + i + '" ' + checked + ' onchange="setAns(' + i + ')"> ' + q.opts[i] + '</label>';
    }
    
    html += '</div></div>';
    document.getElementById('quiz-content').innerHTML = html;
    updateProgress();
}

function setAns(idx) {
    answers[current] = idx;
    renderQ();
}

function nextQuestion() {
    if (current < questions.length - 1) {
        current++;
        renderQ();
    } else {
        showResults();
    }
}

function prevQuestion() {
    if (current > 0) {
        current--;
        renderQ();
    }
}

function updateProgress() {
    var pct = ((current + 1) / questions.length) * 100;
    document.querySelector('.progress-fill').style.width = pct + '%';
}

function showResults() {
    var comp = 0, vocab = 0, grammar = 0, critical = 0, total = 0;
    
    for (var i = 0; i < questions.length; i++) {
        if (answers[i] === questions[i].ans) {
            total++;
            if (questions[i].cat === 'Comprehension') comp++;
            else if (questions[i].cat === 'Vocabulary') vocab++;
            else if (questions[i].cat === 'Grammar') grammar++;
            else if (questions[i].cat === 'Critical Thinking') critical++;
        }
    }
    
    var scoreClass = 'poor';
    var msg = 'Keep practicing! This lesson requires more study.';
    if (total >= 12) {
        scoreClass = 'excellent';
        msg = 'Excellent! You have mastered this lesson.';
    } else if (total >= 10) {
        scoreClass = 'good';
        msg = 'Great job! You have a solid understanding.';
    } else if (total >= 7) {
        scoreClass = 'fair';
        msg = 'Good effort! Review the material and try again.';
    }
    
    document.getElementById('score-display').textContent = total + '/' + questions.length;
    document.getElementById('score-display').className = 'score ' + scoreClass;
    document.getElementById('message-display').textContent = msg;
    document.getElementById('comp-display').textContent = comp + '/3';
    document.getElementById('vocab-display').textContent = vocab + '/4';
    document.getElementById('grammar-display').textContent = grammar + '/5';
    document.getElementById('critical-display').textContent = critical + '/2';
    
    document.getElementById('quiz-content').style.display = 'none';
    document.querySelector('.button-group').style.display = 'none';
    document.getElementById('results').classList.add('show');
}

function restartQuiz() {
    current = 0;
    answers = [];
    document.getElementById('quiz-content').style.display = 'block';
    document.querySelector('.button-group').style.display = 'flex';
    document.getElementById('results').classList.remove('show');
    renderQ();
}

window.onload = function() {
    renderQ();
};
    </script>
</body>
</html>
