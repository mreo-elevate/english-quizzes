<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI History and Revolution Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #000000;
            color: #FFFFFF;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #111111;
            border: 2px solid #FFFFFF;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 4px solid #FFFF00;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 48px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 20px;
            color: #CCCCCC;
        }
        .quiz-content {
            display: none;
        }
        .quiz-content.active {
            display: block;
        }
        .question-number {
            font-size: 14px;
            color: #FFFF00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #FFFFFF;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover {
            background: #FFFFFF;
            color: #000000;
        }
        .option input[type="radio"] {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 18px;
        }
        .textarea-container {
            margin-bottom: 30px;
        }
        .textarea-container textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #FFFFFF;
            background: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .textarea-container textarea:focus {
            outline: none;
            border-color: #FFFF00;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 40px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #FFFFFF;
            background: #000000;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #FFFFFF;
            color: #000000;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results {
            display: none;
            text-align: center;
        }
        .results.active {
            display: block;
        }
        .results h2 {
            font-size: 48px;
            margin-bottom: 30px;
            color: #FFFF00;
        }
        .score-breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
        }
        .score-item {
            border: 2px solid #FFFFFF;
            padding: 20px;
        }
        .score-item h3 {
            font-size: 18px;
            color: #FFFF00;
            margin-bottom: 10px;
        }
        .score-item p {
            font-size: 24px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI HISTORY & REVOLUTION</h1>
            <p>Test your knowledge about the evolution of artificial intelligence</p>
        </div>

        <div id="quizContainer">
            <!-- Questions will be generated by JavaScript -->
        </div>

        <div id="resultsContainer" class="results"></div>
    </div>

    <script>
        const questions = [
            {
                type: 'comprehension',
                question: 'Who proposed the Turing Test in 1950?',
                options: [
                    { text: 'Alan Turing', correct: true },
                    { text: 'John McCarthy', correct: false },
                    { text: 'Marvin Minsky', correct: false },
                    { text: 'Geoffrey Hinton', correct: false }
                ]
            },
            {
                type: 'comprehension',
                question: 'What was the "AI Winter"?',
                options: [
                    { text: 'A period when AI research was severely underfunded', correct: true },
                    { text: 'A conference about artificial intelligence', correct: false },
                    { text: 'A type of neural network', correct: false },
                    { text: 'A programming language for AI', correct: false }
                ]
            },
            {
                type: 'comprehension',
                question: 'In what year was the Transformer architecture introduced?',
                options: [
                    { text: '2015', correct: false },
                    { text: '2016', correct: false },
                    { text: '2017', correct: true },
                    { text: '2018', correct: false }
                ]
            },
            {
                type: 'vocabulary',
                question: 'What is a NEURAL NETWORK?',
                options: [
                    { text: 'A computing system inspired by biological neural networks in animal brains', correct: true },
                    { text: 'A network of computers connected to the internet', correct: false },
                    { text: 'A type of social media platform', correct: false },
                    { text: 'A programming language for web development', correct: false }
                ]
            },
            {
                type: 'vocabulary',
                question: 'Which term describes AI systems that generate text, images, or other media?',
                options: [
                    { text: 'Predictive AI', correct: false },
                    { text: 'Generative AI', correct: true },
                    { text: 'Reactive AI', correct: false },
                    { text: 'Symbolic AI', correct: false }
                ]
            },
            {
                type: 'vocabulary',
                question: 'What is MACHINE LEARNING?',
                options: [
                    { text: 'A subset of AI that enables systems to learn from experience without being explicitly programmed', correct: true },
                    { text: 'A robot that performs mechanical tasks', correct: false },
                    { text: 'A type of computer hardware', correct: false },
                    { text: 'A method of teaching humans to use computers', correct: false }
                ]
            },
            {
                type: 'vocabulary',
                question: 'What is an ALGORITHM?',
                options: [
                    { text: 'A set of rules or instructions given to an AI to help it learn on its own', correct: true },
                    { text: 'A type of computer virus', correct: false },
                    { text: 'A mathematical equation', correct: false },
                    { text: 'A programming language', correct: false }
                ]
            },
            {
                type: 'grammar',
                question: 'Which sentence uses passive voice correctly?',
                options: [
                    { text: 'The term "Artificial Intelligence" was coined in 1956.', correct: true },
                    { text: 'The researchers coined the term "Artificial Intelligence" in 1956.', correct: false },
                    { text: 'In 1956, they coined the term "Artificial Intelligence".', correct: false },
                    { text: 'The term "Artificial Intelligence" coins in 1956.', correct: false }
                ]
            },
            {
                type: 'grammar',
                question: 'Rewrite in passive voice: "Joseph Weizenbaum created the first chatbot, ELIZA."',
                options: [
                    { text: 'The first chatbot, ELIZA, was created by Joseph Weizenbaum.', correct: true },
                    { text: 'Joseph Weizenbaum was created the first chatbot, ELIZA.', correct: false },
                    { text: 'The first chatbot, ELIZA, created by Joseph Weizenbaum.', correct: false },
                    { text: 'ELIZA was created the first chatbot by Joseph Weizenbaum.', correct: false }
                ]
            },
            {
                type: 'grammar',
                question: 'Which passive voice sentence is correct?',
                options: [
                    { text: 'The Transformer architecture was introduced in 2017.', correct: true },
                    { text: 'The Transformer architecture introduced in 2017.', correct: false },
                    { text: 'In 2017, the Transformer architecture was introduce.', correct: false },
                    { text: 'The Transformer architecture was introducing in 2017.', correct: false }
                ]
            },
            {
                type: 'grammar',
                question: 'Rewrite in passive voice: "AI research severely underfunded during the AI Winter."',
                options: [
                    { text: 'AI research was severely underfunded during the AI Winter.', correct: true },
                    { text: 'AI research had severely underfunded during the AI Winter.', correct: false },
                    { text: 'During the AI Winter, AI research was underfund severely.', correct: false },
                    { text: 'AI research severely was underfunded during the AI Winter.', correct: false }
                ]
            },
            {
                type: 'critical_thinking',
                question: 'What does the exponential growth of the AI market ($391 billion in 2025 to $1.81 trillion by 2030) suggest about the future?',
                options: [
                    { text: 'AI will become increasingly important in all industries and sectors', correct: true },
                    { text: 'AI is a temporary trend that will disappear soon', correct: false },
                    { text: 'AI technology is becoming less useful', correct: false },
                    { text: 'Only tech companies will benefit from AI growth', correct: false }
                ]
            },
            {
                type: 'critical_thinking',
                question: 'Why was the Transformer architecture revolutionary for AI development?',
                options: [
                    { text: 'It enabled the creation of powerful Large Language Models like ChatGPT', correct: true },
                    { text: 'It made computers faster', correct: false },
                    { text: 'It eliminated the need for neural networks', correct: false },
                    { text: 'It was the first AI technology ever created', correct: false }
                ]
            },
            {
                type: 'open_ended',
                question: 'Do you think AI will replace human jobs? Explain your reasoning.',
                text_input: true
            },
            {
                type: 'open_ended',
                question: 'What ethical limits, if any, should be placed on AI development? Why?',
                text_input: true
            }
        ];

        let currentQuestion = 0;
        let answers = [];
        let scores = {
            comprehension: 0,
            vocabulary: 0,
            grammar: 0,
            critical_thinking: 0,
            open_ended: 0
        };
        let maxScores = {
            comprehension: 0,
            vocabulary: 0,
            grammar: 0,
            critical_thinking: 0,
            open_ended: 0
        };

        // Count max scores
        questions.forEach(q => {
            maxScores[q.type]++;
        });

        function renderQuestion() {
            const container = document.getElementById('quizContainer');
            const q = questions[currentQuestion];
            
            let html = `
                <div class="quiz-content active">
                    <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
            `;

            if (q.text_input) {
                html += `
                    <div class="textarea-container">
                        <textarea id="answer" placeholder="Type your answer here..."></textarea>
                    </div>
                `;
            } else {
                html += '<div class="options">';
                q.options.forEach((opt, idx) => {
                    html += `
                        <div class="option">
                            <input type="radio" id="opt${idx}" name="answer" value="${idx}">
                            <label for="opt${idx}">${opt.text}</label>
                        </div>
                    `;
                });
                html += '</div>';
            }

            html += `
                <div class="navigation">
                    <button class="btn" onclick="previousQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>PREVIOUS</button>
                    <button class="btn" onclick="nextQuestion()">NEXT</button>
                </div>
            `;

            container.innerHTML = html;
        }

        function nextQuestion() {
            const q = questions[currentQuestion];
            
            if (q.text_input) {
                const answer = document.getElementById('answer').value;
                answers[currentQuestion] = answer;
            } else {
                const selected = document.querySelector('input[name="answer"]:checked');
                if (!selected) {
                    alert('Please select an answer');
                    return;
                }
                const answerIdx = parseInt(selected.value);
                answers[currentQuestion] = answerIdx;
                
                if (q.options[answerIdx].correct) {
                    scores[q.type]++;
                }
            }

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function showResults() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            
            const resultsContainer = document.getElementById('resultsContainer');
            const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
            const maxTotal = Object.values(maxScores).reduce((a, b) => a + b, 0);
            const percentage = Math.round((totalScore / maxTotal) * 100);

            let message = '';
            if (percentage >= 90) message = 'Excellent! You have mastered this lesson.';
            else if (percentage >= 75) message = 'Great! You have a strong understanding.';
            else if (percentage >= 60) message = 'Good! Keep practicing to improve.';
            else message = 'Keep studying to master this content.';

            let html = `
                <h2>${percentage}%</h2>
                <p style="font-size: 24px; margin-bottom: 40px;">${message}</p>
                <div class="score-breakdown">
                    <div class="score-item">
                        <h3>COMPREHENSION</h3>
                        <p>${scores.comprehension}/${maxScores.comprehension}</p>
                    </div>
                    <div class="score-item">
                        <h3>VOCABULARY</h3>
                        <p>${scores.vocabulary}/${maxScores.vocabulary}</p>
                    </div>
                    <div class="score-item">
                        <h3>GRAMMAR</h3>
                        <p>${scores.grammar}/${maxScores.grammar}</p>
                    </div>
                    <div class="score-item">
                        <h3>CRITICAL THINKING</h3>
                        <p>${scores.critical_thinking}/${maxScores.critical_thinking}</p>
                    </div>
                </div>
                <button class="btn" onclick="location.reload()">RESTART QUIZ</button>
            `;

            resultsContainer.innerHTML = html;
            resultsContainer.classList.add('active');
        }

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
