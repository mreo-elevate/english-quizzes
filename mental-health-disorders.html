<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Disorders Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .quiz-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s ease;
        }
        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #333;
            line-height: 1.6;
            min-height: 60px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
            min-height: 280px;
        }
        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            display: flex;
            align-items: center;
        }
        .option:hover {
            border-color: #667eea;
            background: #f5f5f5;
        }
        .option input[type="radio"] {
            margin-right: 15px;
            cursor: pointer;
            width: 20px;
            height: 20px;
        }
        .option label {
            cursor: pointer;
            font-size: 16px;
            color: #555;
            flex: 1;
            margin: 0;
        }
        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 30px;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-prev {
            background: #e0e0e0;
            color: #333;
        }
        .btn-prev:hover:not(:disabled) {
            background: #d0d0d0;
        }
        .btn-next {
            background: #667eea;
            color: white;
            flex: 1;
        }
        .btn-next:hover:not(:disabled) {
            background: #5568d3;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .results.show {
            display: block;
        }
        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        .feedback-message {
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .restart-btn {
            background: #667eea;
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            margin-top: 20px;
        }
        .restart-btn:hover {
            background: #5568d3;
        }
        .quiz-content {
            display: block;
        }
        .quiz-content.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-content" id="quizContent">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-number" id="questionNumber"></div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="navigation">
                <button class="btn-prev" id="prevBtn" onclick="previousQuestion()">← PREVIOUS</button>
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()">NEXT →</button>
            </div>
        </div>
        <div class="results" id="results">
            <div class="score-display" id="scoreDisplay"></div>
            <div class="feedback-message" id="feedbackMessage"></div>
            <button class="restart-btn" onclick="restartQuiz()">RETAKE QUIZ</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "Which relative clause correctly describes people with anxiety?",
                options: [
                    "People which experience anxiety often feel worried about everyday situations.",
                    "People who experience anxiety often feel worried about everyday situations.",
                    "People where experience anxiety often feel worried about everyday situations.",
                    "People that anxiety often feel worried about everyday situations."
                ],
                correct: 1
            },
            {
                question: "What is depression?",
                options: [
                    "A temporary feeling of sadness that goes away quickly",
                    "A mental health condition involving persistent sadness and loss of interest in activities",
                    "A personality trait that makes someone serious",
                    "A sign of weakness or laziness"
                ],
                correct: 1
            },
            {
                question: "Which sentence uses a relative clause correctly about OCD?",
                options: [
                    "OCD is a disorder that involves unwanted thoughts and repetitive behaviors.",
                    "OCD is a disorder which people are born with from childhood.",
                    "OCD is a syndrome where only certain people can develop.",
                    "OCD is an illness whose causes are purely genetic."
                ],
                correct: 0
            },
            {
                question: "What is Generalized Anxiety Disorder (GAD)?",
                options: [
                    "Fear of specific situations like flying or heights",
                    "Persistent worry about many aspects of daily life",
                    "Sudden episodes of intense fear with physical symptoms",
                    "Anxiety that only affects young people"
                ],
                correct: 1
            },
            {
                question: "How would you use 'where' in a relative clause about mental health support?",
                options: [
                    "Therapy provides a safe space where people can talk about their feelings.",
                    "The therapist where helped me was very experienced.",
                    "Depression is a condition where people experience it constantly.",
                    "Anxiety is a disorder which occurs in safe spaces."
                ],
                correct: 0
            },
            {
                question: "What is bipolar disorder?",
                options: [
                    "A condition where people experience extreme mood changes between very high and very low periods",
                    "A disorder that only affects one emotion at a time",
                    "A temporary mood change that everyone experiences",
                    "A condition that only affects teenagers"
                ],
                correct: 0
            },
            {
                question: "Which relative clause correctly describes schizophrenia?",
                options: [
                    "Schizophrenia is a condition that affects how people think, feel, and perceive reality.",
                    "Schizophrenia is a condition which people can catch from others.",
                    "Schizophrenia is a disorder where it only affects the elderly.",
                    "Schizophrenia is an illness whose people are always violent."
                ],
                correct: 0
            },
            {
                question: "How would you correctly combine these sentences using 'who'? 'Mental health professionals help patients. They provide support and treatment.'",
                options: [
                    "Mental health professionals who provide support and treatment help patients.",
                    "Mental health professionals which provide support and treatment help patients.",
                    "Mental health professionals where provide support and treatment help patients.",
                    "Mental health professionals that help patients provide support and treatment."
                ],
                correct: 0
            },
            {
                question: "What is OCD?",
                options: [
                    "A preference for organizing things neatly",
                    "A condition involving unwanted thoughts and the need to repeat certain behaviors",
                    "A sign that someone is very careful and responsible",
                    "A temporary habit that goes away on its own"
                ],
                correct: 1
            },
            {
                question: "Which statement correctly uses a relative clause about anxiety?",
                options: [
                    "Anxiety is a feeling that many people experience in stressful situations.",
                    "Anxiety is a condition which only affects weak people.",
                    "Anxiety is a disorder where it never goes away.",
                    "Anxiety is an illness whose people are always nervous."
                ],
                correct: 0
            },
            {
                question: "What is schizophrenia?",
                options: [
                    "A mental health condition that affects how people think and perceive the world",
                    "A disorder where people have multiple personalities",
                    "A condition that makes people violent",
                    "A temporary confusion that goes away quickly"
                ],
                correct: 0
            },
            {
                question: "How would you use 'whose' in a relative clause about mental health?",
                options: [
                    "People whose mental health struggles are often misunderstood deserve compassion.",
                    "The condition whose affects many people is very serious.",
                    "Depression is a disorder whose people experience it constantly.",
                    "Anxiety is a feeling whose occurs in safe spaces."
                ],
                correct: 0
            },
            {
                question: "What is the main characteristic of depression?",
                options: [
                    "Feeling sad about specific events",
                    "Persistent sadness and loss of interest in activities that usually bring joy",
                    "Being lazy or unmotivated",
                    "A sign of personal failure"
                ],
                correct: 1
            },
            {
                question: "Which relative clause correctly describes bipolar disorder?",
                options: [
                    "Bipolar disorder is a condition that involves extreme mood swings.",
                    "Bipolar disorder is a condition which only affects rich people.",
                    "Bipolar disorder is a disorder where people are always happy.",
                    "Bipolar disorder is an illness whose causes are only genetic."
                ],
                correct: 0
            },
            {
                question: "What is GAD?",
                options: [
                    "Fear of specific objects or situations",
                    "Persistent worry about many different aspects of daily life",
                    "Sudden panic attacks without warning",
                    "Anxiety that only happens at night"
                ],
                correct: 1
            },
            {
                question: "How would you correctly use 'that' in a relative clause about mental health?",
                options: [
                    "Mental health is something that affects millions of people worldwide.",
                    "Mental health is something which affects millions of people worldwide.",
                    "Mental health is something where affects millions of people worldwide.",
                    "Mental health is something whose affects millions of people worldwide."
                ],
                correct: 0
            },
            {
                question: "What is the relationship between anxiety and panic?",
                options: [
                    "They are exactly the same condition",
                    "Anxiety is persistent worry; panic involves sudden intense fear",
                    "Panic is more common than anxiety",
                    "Anxiety only affects adults; panic only affects children"
                ],
                correct: 1
            },
            {
                question: "Which sentence uses a relative clause correctly about depression?",
                options: [
                    "Depression is a condition that can affect anyone, regardless of age or background.",
                    "Depression is a condition which only affects sad people.",
                    "Depression is a disorder where it only happens in winter.",
                    "Depression is an illness whose people are always negative."
                ],
                correct: 0
            },
            {
                question: "What is a key difference between anxiety and OCD?",
                options: [
                    "Anxiety involves worry; OCD involves unwanted thoughts and repetitive behaviors",
                    "They are the same condition with different names",
                    "Anxiety is more serious than OCD",
                    "OCD only affects young people; anxiety only affects adults"
                ],
                correct: 0
            },
            {
                question: "How would you correctly combine these sentences? 'Therapy helps people. It provides tools to manage mental health.'",
                options: [
                    "Therapy, which provides tools to manage mental health, helps people.",
                    "Therapy helps people that provides tools to manage mental health.",
                    "Therapy helps people where provides tools to manage mental health.",
                    "Therapy helps people whose provides tools to manage mental health."
                ],
                correct: 0
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);

        function shuffleOptions(options) {
            const shuffled = [...options];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function displayQuestion() {
            const question = questions[currentQuestion];
            const shuffledOptions = shuffleOptions(question.options);
            const correctIndex = shuffledOptions.indexOf(question.options[question.correct]);
            
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            shuffledOptions.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (answers[currentQuestion] === index) {
                    optionDiv.classList.add('selected');
                }
                
                optionDiv.innerHTML = `
                    <input type="radio" id="option${index}" name="answer" value="${index}" ${answers[currentQuestion] === index ? 'checked' : ''}>
                    <label for="option${index}">${option}</label>
                `;
                
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });
            
            updateProgress();
            updateButtons();
        }

        function selectOption(index) {
            answers[currentQuestion] = index;
            displayQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? 'SUBMIT' : 'NEXT →';
        }

        function showResults() {
            let score = 0;
            answers.forEach((answer, index) => {
                const shuffledOptions = shuffleOptions(questions[index].options);
                const correctIndex = shuffledOptions.indexOf(questions[index].options[questions[index].correct]);
                if (answer === correctIndex) {
                    score++;
                }
            });

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('quizContent').classList.add('hidden');
            document.getElementById('results').classList.add('show');
            document.getElementById('scoreDisplay').textContent = `${score}/${questions.length} (${percentage}%)`;
            
            let feedback = '';
            if (percentage >= 90) {
                feedback = 'Excellent! You have mastered this material.';
            } else if (percentage >= 75) {
                feedback = 'Great! You have a strong understanding.';
            } else if (percentage >= 60) {
                feedback = 'Good! Keep practicing to improve.';
            } else {
                feedback = 'Keep studying to master this content.';
            }
            document.getElementById('feedbackMessage').textContent = feedback;
        }

        function restartQuiz() {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('results').classList.remove('show');
            displayQuestion();
        }

        displayQuestion();
    </script>
</body>
</html>
