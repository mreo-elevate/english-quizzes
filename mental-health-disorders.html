<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Disorders Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .quiz-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s ease;
        }
        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #333;
            line-height: 1.6;
            min-height: 60px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
            min-height: 280px;
        }
        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            display: flex;
            align-items: center;
        }
        .option:hover {
            border-color: #667eea;
            background: #f5f5f5;
        }
        .option input[type="radio"] {
            margin-right: 15px;
            cursor: pointer;
            width: 20px;
            height: 20px;
        }
        .option label {
            cursor: pointer;
            font-size: 16px;
            color: #555;
            flex: 1;
            margin: 0;
        }
        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 30px;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-prev {
            background: #e0e0e0;
            color: #333;
        }
        .btn-prev:hover:not(:disabled) {
            background: #d0d0d0;
        }
        .btn-next {
            background: #667eea;
            color: white;
            flex: 1;
        }
        .btn-next:hover:not(:disabled) {
            background: #5568d3;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .results.show {
            display: block;
        }
        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        .feedback-message {
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .restart-btn {
            background: #667eea;
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            margin-top: 20px;
        }
        .restart-btn:hover {
            background: #5568d3;
        }
        .quiz-content {
            display: block;
        }
        .quiz-content.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-content" id="quizContent">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-number" id="questionNumber"></div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="navigation">
                <button class="btn-prev" id="prevBtn" onclick="previousQuestion()">← PREVIOUS</button>
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()">NEXT →</button>
            </div>
        </div>
        <div class="results" id="results">
            <div class="score-display" id="scoreDisplay"></div>
            <div class="feedback-message" id="feedbackMessage"></div>
            <button class="restart-btn" onclick="restartQuiz()">RETAKE QUIZ</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "Which term describes the simultaneous occurrence of two or more distinct mental health disorders in the same individual?",
                options: [
                    "Comorbidity",
                    "Dysregulation",
                    "Neurodivergence",
                    "Psychosomatic"
                ],
                correct: 0
            },
            {
                question: "What is the primary characteristic of 'neurodivergence'?",
                options: [
                    "A mental illness requiring medication",
                    "Variations in the brain's neurological functioning, such as autism or ADHD",
                    "A temporary condition caused by trauma",
                    "A personality disorder affecting social interactions"
                ],
                correct: 1
            },
            {
                question: "Which relative clause correctly describes individuals with mental health disorders?",
                options: [
                    "Individuals which experience anxiety often struggle with daily tasks.",
                    "Individuals who experience anxiety often struggle with daily tasks.",
                    "Individuals where experience anxiety often struggle with daily tasks.",
                    "Individuals that anxiety often struggle with daily tasks."
                ],
                correct: 1
            },
            {
                question: "What does 'emotional dysregulation' refer to?",
                options: [
                    "The inability to control or manage emotional responses appropriately",
                    "The complete absence of emotional responses",
                    "The exaggeration of positive emotions only",
                    "A permanent state of happiness"
                ],
                correct: 0
            },
            {
                question: "Which term describes the discrimination and negative stereotyping of individuals with mental health disorders?",
                options: [
                    "Neurodiversity",
                    "Stigmatization",
                    "Dysregulation",
                    "Comorbidity"
                ],
                correct: 1
            },
            {
                question: "How would you correctly use 'whose' in a relative clause about mental health treatment?",
                options: [
                    "Patients whose symptoms persist for more than two weeks should seek professional help.",
                    "The therapist whose helped me was very experienced.",
                    "Depression is a condition whose people experience constantly.",
                    "Anxiety is a disorder which occurs in safe spaces."
                ],
                correct: 0
            },
            {
                question: "What is 'psychosomatic' in the context of mental health?",
                options: [
                    "A mental illness that only affects the brain",
                    "Physical symptoms that occur without a clear medical cause, often linked to psychological factors",
                    "A personality trait that makes someone resistant to stress",
                    "A type of medication used to treat anxiety"
                ],
                correct: 1
            },
            {
                question: "Which relative clause correctly describes the relationship between therapy and mental health?",
                options: [
                    "Therapy is a process that helps individuals address psychological challenges.",
                    "Therapy is a condition where people are born with.",
                    "Therapy is a syndrome which only works for some people.",
                    "Therapy is an illness whose causes are purely genetic."
                ],
                correct: 0
            },
            {
                question: "What does 'neurodivergent' mean in simple terms?",
                options: [
                    "A person with a mental illness",
                    "A person whose brain works differently, such as those with autism or ADHD",
                    "A person who is not intelligent",
                    "A person who needs constant medical supervision"
                ],
                correct: 1
            },
            {
                question: "Which statement correctly uses a relative clause about mental health support?",
                options: [
                    "Support groups are spaces where people can share their experiences and find community.",
                    "Support groups are conditions which only help some people.",
                    "Support groups are disorders that people inherit.",
                    "Support groups are places that anxiety disappears."
                ],
                correct: 0
            },
            {
                question: "What is the key difference between 'stigma' and 'comorbidity'?",
                options: [
                    "Stigma is social discrimination; comorbidity is the presence of multiple disorders",
                    "They are the same thing with different names",
                    "Stigma is a medical condition; comorbidity is a social issue",
                    "Stigma only affects wealthy people; comorbidity only affects poor people"
                ],
                correct: 0
            },
            {
                question: "How would you correctly combine these sentences using a relative clause? 'Mental health professionals help patients. They provide evidence-based treatment.'",
                options: [
                    "Mental health professionals who provide evidence-based treatment help patients.",
                    "Mental health professionals which provide evidence-based treatment help patients.",
                    "Mental health professionals where provide evidence-based treatment help patients.",
                    "Mental health professionals that help patients provide evidence-based treatment."
                ],
                correct: 0
            },
            {
                question: "What does 'dysregulation' specifically refer to in mental health contexts?",
                options: [
                    "The ability to control emotions effectively",
                    "The inability to regulate emotions, behaviors, or impulses appropriately",
                    "A permanent improvement in mental health",
                    "A type of medication used to treat depression"
                ],
                correct: 1
            },
            {
                question: "Which relative clause correctly describes therapy?",
                options: [
                    "Therapy is a process whose goal is to help individuals improve their mental health.",
                    "Therapy is a condition that people are born with.",
                    "Therapy is a disorder where people inherit.",
                    "Therapy is an illness which only affects young people."
                ],
                correct: 0
            },
            {
                question: "What is the relationship between 'neurodivergence' and 'mental illness'?",
                options: [
                    "They are the same thing",
                    "Neurodivergence refers to differences in brain functioning; mental illness refers to conditions causing distress or dysfunction",
                    "Neurodivergence is more serious than mental illness",
                    "Mental illness is a type of neurodivergence"
                ],
                correct: 1
            },
            {
                question: "How would you use 'where' in a relative clause about mental health support?",
                options: [
                    "Therapy provides a safe space where individuals can express their feelings without judgment.",
                    "The therapist where helped me was very experienced.",
                    "Depression is a condition where people experience it constantly.",
                    "Anxiety is a disorder which occurs in safe spaces."
                ],
                correct: 0
            },
            {
                question: "What does 'comorbidity' mean in mental health?",
                options: [
                    "The cure for mental illness",
                    "The simultaneous presence of two or more mental health disorders in one person",
                    "A type of therapy used to treat anxiety",
                    "A genetic predisposition to mental illness"
                ],
                correct: 1
            },
            {
                question: "Which term best describes negative attitudes and beliefs about people with mental health disorders?",
                options: [
                    "Neurodiversity",
                    "Dysregulation",
                    "Stigmatization",
                    "Psychosomatic"
                ],
                correct: 2
            },
            {
                question: "How would you correctly rewrite this sentence using a relative clause? 'Mental health is important. It affects our overall well-being.'",
                options: [
                    "Mental health, which affects our overall well-being, is important.",
                    "Mental health is important that affects our overall well-being.",
                    "Mental health is important where affects our overall well-being.",
                    "Mental health is important whose affects our overall well-being."
                ],
                correct: 0
            },
            {
                question: "What is the primary focus of understanding mental health disorders in an educational context?",
                options: [
                    "To diagnose and treat disorders",
                    "To reduce stigma and increase awareness and compassion",
                    "To determine who is mentally ill",
                    "To prove that mental illness is not real"
                ],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let shuffledQuestions = [];

        function shuffleOptions(options) {
            const shuffled = [...options];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function displayQuestion() {
            const question = questions[currentQuestion];
            const shuffledOptions = shuffleOptions(question.options);
            const correctIndex = shuffledOptions.indexOf(question.options[question.correct]);
            
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            shuffledOptions.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (answers[currentQuestion] === index) {
                    optionDiv.classList.add('selected');
                }
                
                optionDiv.innerHTML = `
                    <input type="radio" id="option${index}" name="answer" value="${index}" ${answers[currentQuestion] === index ? 'checked' : ''}>
                    <label for="option${index}">${option}</label>
                `;
                
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });
            
            updateProgress();
            updateButtons();
        }

        function selectOption(index) {
            answers[currentQuestion] = index;
            displayQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? 'SUBMIT' : 'NEXT →';
        }

        function showResults() {
            let score = 0;
            answers.forEach((answer, index) => {
                const shuffledOptions = shuffleOptions(questions[index].options);
                const correctIndex = shuffledOptions.indexOf(questions[index].options[questions[index].correct]);
                if (answer === correctIndex) {
                    score++;
                }
            });

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('quizContent').classList.add('hidden');
            document.getElementById('results').classList.add('show');
            document.getElementById('scoreDisplay').textContent = `${score}/${questions.length} (${percentage}%)`;
            
            let feedback = '';
            if (percentage >= 90) {
                feedback = 'Excellent! You have mastered this material on mental health disorders.';
            } else if (percentage >= 75) {
                feedback = 'Great! You have a strong understanding of mental health disorders.';
            } else if (percentage >= 60) {
                feedback = 'Good! Keep practicing to deepen your knowledge of mental health disorders.';
            } else {
                feedback = 'Keep studying to master this important content on mental health disorders.';
            }
            document.getElementById('feedbackMessage').textContent = feedback;
        }

        function restartQuiz() {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('results').classList.remove('show');
            displayQuestion();
        }

        displayQuestion();
    </script>
</body>
</html>
